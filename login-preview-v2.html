<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>登录 - Scrapbook Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #ffffff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* ===== 手账卡片容器 ===== */
  .scrapbook {
    width: 100%;
    max-width: 440px;
  }

  /* ----- 活页装订孔 ----- */
  .binder-tabs {
    display: flex;
    gap: 24px;
    padding: 0 20px;
    margin-bottom: -8px;
    position: relative;
    z-index: 2;
  }

  .binder-tab {
    width: 32px;
    height: 18px;
    background: #ffffff;
    border: 1px solid #f0f0f0;
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    position: relative;
  }

  .binder-tab::after {
    content: '';
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 1.5px solid #e0e0e0;
    background: #fafafa;
  }

  /* ----- 卡片主体 ----- */
  .card {
    background: #ffffff;
    border: 1px solid #eaeaea;
    border-radius: 2px;
    padding: 36px 32px 30px;
    box-shadow: 0 2px 24px rgba(0,0,0,0.04);
  }

  /* ===== 头部信息区：左图右文 ===== */
  .hero {
    display: flex;
    gap: 24px;
    align-items: center;
    margin-bottom: 32px;
  }

  /* -- 左侧：大五角星 + 拍立得照片 -- */
  .hero-left {
    position: relative;
    width: 120px;
    height: 130px;
    flex-shrink: 0;
  }

  /* 浅灰几何大五角星 */
  .hero-star {
    position: absolute;
    top: -16px;
    left: 50px;
    width: 130px;
    height: 130px;
    background: #f4f4f4;
    transform: rotate(-12deg);
    clip-path: polygon(
      50% 0%, 61% 35%, 98% 35%, 68% 57%,
      79% 91%, 50% 70%, 21% 91%, 32% 57%,
      2% 35%, 39% 35%
    );
    z-index: 0;
  }

  /* 拍立得照片框 (倾斜) */
  .polaroid {
    position: absolute;
    top: 8px;
    left: 15px;
    width: 84px;
    height: 100px;
    background: #fff;
    border: 1px solid #e8e8e8;
    box-shadow: 3px 4px 12px rgba(0,0,0,0.08);
    transform: rotate(-6deg);
    z-index: 1;
    padding: 6px 6px 0;
  }

  .polaroid-img {
    width: 100%;
    height: 60px;
    background: #f9f9f9;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .polaroid-img svg {
    width: 36px;
    height: 36px;
    color: #ccc;
    stroke: #bbb;
  }

  .polaroid-bottom {
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
    font-size: 8px;
    color: #aaa;
    letter-spacing: 1px;
  }

  /* 回形针 */
  .paperclip {
    position: absolute;
    top: -12px;
    left: -6px;
    width: 22px;
    height: 36px;
    z-index: 3;
    transform: rotate(-38deg);
  }

  .paperclip svg {
    width: 22px;
    height: 36px;
    color: #888;
    stroke: #888;
    fill: none;
    stroke-width: 2;
  }

  /* -- 右侧：文字信息 -- */
  .hero-right {
    flex: 1;
    min-width: 0;
    position: relative;
    z-index: 1;
  }

  .breadcrumb {
    font-family: 'Courier New', 'Source Code Pro', monospace;
    font-size: 9px;
    color: #aaa;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .breadcrumb span { color: #555; }

  .hero-title {
    font-size: 20px;
    font-weight: 700;
    color: #222;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .hero-sub {
    font-family: 'Courier New', 'Source Code Pro', monospace;
    font-size: 10px;
    color: #999;
    letter-spacing: 1px;
    font-style: italic;
  }

  .hero-sig {
    font-family: 'Courier New', 'Source Code Pro', monospace;
    font-size: 9px;
    color: #888;
    margin-top: 8px;
    letter-spacing: 1px;
  }

  /* ===== Tab 切换区 ===== */
  .tabs {
    display: flex;
    gap: 28px;
    margin-bottom: 24px;
    border-bottom: 1px solid #f0f0f0;
    padding-bottom: 0;
  }

  .tab {
    font-size: 13px;
    font-weight: 500;
    color: #bbb;
    cursor: pointer;
    padding-bottom: 8px;
    letter-spacing: 1px;
    transition: color 0.2s;
    position: relative;
  }

  .tab.active {
    color: #222;
  }

  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: #222;
  }

  /* ===== 表单卡片容器 ===== */
  .form-card {
    border: 1px solid #eaeaea;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .form-card-title {
    background: #fafafa;
    padding: 8px 16px;
    font-family: 'Courier New', 'Source Code Pro', monospace;
    font-size: 10px;
    color: #888;
    letter-spacing: 2px;
    border-bottom: 1px solid #f0f0f0;
  }

  .form-card-body {
    padding: 20px 18px 18px;
  }

  /* ===== 输入框 ===== */
  .input-wrap {
    position: relative;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
  }

  .input-wrap .input-icon {
    position: absolute;
    left: 14px;
    z-index: 2;
    display: flex;
    align-items: center;
    pointer-events: none;
  }

  .input-wrap .input-icon svg {
    width: 16px;
    height: 16px;
    stroke: #bbb;
    fill: none;
    stroke-width: 1.5;
  }

  .input-wrap input {
    width: 100%;
    padding: 13px 42px 13px 40px;
    border: 1px solid #eaeaea;
    border-radius: 20px;
    background: #fff;
    font-size: 13px;
    color: #333;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    letter-spacing: 0.5px;
  }

  .input-wrap input::placeholder { color: #ccc; font-weight: 300; }
  .input-wrap input:focus {
    border-color: #888;
    box-shadow: 0 0 0 2px rgba(0,0,0,0.04);
  }

  .input-clear {
    position: absolute;
    right: 12px;
    width: 20px;
    height: 20px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: #eee;
    transition: background 0.2s;
  }

  .input-clear:hover { background: #ddd; }

  .input-clear svg {
    width: 10px;
    height: 10px;
    stroke: #888;
    stroke-width: 2;
  }

  .input-wrap input:not(:placeholder-shown) ~ .input-clear { display: flex; }

  /* ===== 复选框 ===== */
  .checkbox-wrap {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
    margin-bottom: 4px;
  }

  .checkbox-wrap input[type=checkbox] {
    display: none;
  }

  .custom-check {
    width: 18px;
    height: 18px;
    border: 1.5px solid #d0d0d0;
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .checkbox-wrap input:checked + .custom-check {
    background: #222;
    border-color: #222;
  }

  .checkbox-wrap input:checked + .custom-check::after {
    content: '';
    width: 5px;
    height: 9px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg) translateY(-1px);
  }

  .check-label-main {
    font-size: 12px;
    color: #444;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .check-label-sub {
    font-size: 10px;
    color: #bbb;
    font-family: 'Courier New', 'Source Code Pro', monospace;
    letter-spacing: 0.5px;
  }

  /* ===== 底部操作区 ===== */
  .form-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-link {
    font-size: 11px;
    color: #888;
    cursor: pointer;
    letter-spacing: 1px;
    border-bottom: 1px solid #ccc;
    padding-bottom: 1px;
    transition: color 0.2s, border-color 0.2s;
    font-family: 'Courier New', 'Source Code Pro', monospace;
  }

  .footer-link:hover { color: #333; border-color: #666; }

  .btn-submit {
    padding: 12px 32px;
    background: #222;
    color: #fff;
    border: none;
    border-radius: 22px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .btn-submit:hover { background: #000; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
  .btn-submit:active { transform: scale(0.97); }

  /* ===== 面板切换 ===== */
  #register-panel .form-card { display: none; }
  #register-panel .form-card { display: block; }
  #login-form-card, #reg-form-card { display: none; }
  #login-form-card.show, #reg-form-card.show { display: block; }

  /* ===== Toast ===== */
  .toast {
    position: fixed;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: #222;
    color: #fff;
    padding: 10px 24px;
    border-radius: 20px;
    font-size: 12px;
    letter-spacing: 1px;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; }

  .tagline {
    text-align: center;
    margin-top: 24px;
    font-size: 10px;
    color: #ccc;
    letter-spacing: 2px;
    font-family: 'Courier New', 'Source Code Pro', monospace;
  }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="scrapbook">

  <!-- 活页装订孔 -->
  <div class="binder-tabs">
    <div class="binder-tab"></div>
    <div class="binder-tab"></div>
    <div class="binder-tab"></div>
    <div class="binder-tab"></div>
    <div class="binder-tab"></div>
    <div class="binder-tab"></div>
  </div>

  <!-- 卡片主体 -->
  <div class="card">

    <!-- ===== 头部信息区 ===== -->
    <div class="hero">
      <!-- 左：几何星 + 拍立得 + 回形针 -->
      <div class="hero-left">
        <div class="hero-star"></div>
        <div class="polaroid">
          <!-- 回形针 -->
          <div class="paperclip">
            <svg viewBox="0 0 24 40">
              <path d="M12 2 L12 35 Q12 38 9 38 Q6 38 6 35 L6 7 Q6 4 9 4 Q12 4 12 7 L12 30" />
            </svg>
          </div>
          <div class="polaroid-img">
            <!-- 相机 SVG 占位 -->
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="2" y="6" width="20" height="15" rx="3" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="12" cy="13.5" r="4" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="12" cy="13.5" r="1.5" fill="currentColor"/>
              <circle cx="7" cy="9.5" r="0.8" fill="currentColor"/>
            </svg>
          </div>
          <div class="polaroid-bottom">snapshot_01</div>
        </div>
      </div>

      <!-- 右：面包屑 + 标题 -->
      <div class="hero-right">
        <div class="breadcrumb">
          Homepage <span style="color:#ccc;">></span> <span>About Me</span>
        </div>
        <div class="hero-title">小元机 ₍ᐢ.ˬ.ᐢ₎</div>
        <div class="hero-sub">Mobile Diary · Personal Space</div>
        <div class="hero-sig">— yours, always.</div>
      </div>
    </div>

    <!-- ===== Tab 切换 ===== -->
    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">Login</div>
      <div class="tab" id="tab-register" onclick="switchTab('register')">Register</div>
    </div>

    <!-- ===== 登录表单 ===== -->
    <div class="form-card show" id="login-form-card">
      <div class="form-card-title">+ Login Info</div>
      <div class="form-card-body">

        <!-- 账号 -->
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-5 3.6-8 8-8s8 3 8 8"/></svg>
          </span>
          <input type="text" id="login-account" placeholder="账号">
          <span class="input-clear" onclick="clearInput('login-account')">
            <svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
          </span>
        </div>

        <!-- 密码 -->
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><circle cx="12" cy="16" r="1"/><line x1="12" y1="6" x2="12" y2="11"/></svg>
          </span>
          <input type="password" id="login-password" placeholder="密码">
          <span class="input-clear" onclick="clearInput('login-password')">
            <svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
          </span>
        </div>

        <!-- 显示密码复选框 -->
        <label class="checkbox-wrap">
          <input type="checkbox" onchange="togglePass('login-password', this)">
          <span class="custom-check"></span>
          <span>
            <div class="check-label-main">显示密码</div>
            <div class="check-label-sub">Show password</div>
          </span>
        </label>

        <!-- 底部 -->
        <div class="form-footer" style="margin-top: 18px;">
          <span class="footer-link">忘了密码？</span>
          <button class="btn-submit" onclick="handleLogin()">登 录</button>
        </div>

      </div>
    </div>

    <!-- ===== 注册表单 ===== -->
    <div class="form-card" id="reg-form-card">
      <div class="form-card-title">+ Register Info</div>
      <div class="form-card-body">

        <!-- QQ -->
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="3"/><line x1="7" y1="9" x2="17" y2="9"/><line x1="7" y1="13" x2="14" y2="13"/></svg>
          </span>
          <input type="number" id="reg-qq" placeholder="QQ 号">
          <span class="input-clear" onclick="clearInput('reg-qq')">
            <svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
          </span>
        </div>

        <!-- 激活码 -->
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="9" width="18" height="12" rx="2"/><circle cx="8" cy="13" r="1.5"/><circle cx="12" cy="13" r="1.5"/><circle cx="16" cy="13" r="1.5"/></svg>
          </span>
          <input type="text" id="reg-code" placeholder="激活码">
          <span class="input-clear" onclick="clearInput('reg-code')">
            <svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
          </span>
        </div>

        <!-- 密码 -->
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><circle cx="12" cy="16" r="1"/><line x1="12" y1="6" x2="12" y2="11"/></svg>
          </span>
          <input type="password" id="reg-password" placeholder="设置密码">
          <span class="input-clear" onclick="clearInput('reg-password')">
            <svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
          </span>
        </div>

        <!-- 确认密码 -->
        <div class="input-wrap" style="margin-bottom:12px;">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><polyline points="7 15 11 19 17 11"/></svg>
          </span>
          <input type="password" id="reg-password-confirm" placeholder="确认密码">
          <span class="input-clear" onclick="clearInput('reg-password-confirm')">
            <svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
          </span>
        </div>

        <!-- 底部 -->
        <div class="form-footer" style="margin-top: 12px;">
          <span class="footer-link" onclick="switchTab('login')">← 返回登录</span>
          <button class="btn-submit" onclick="handleRegister()">注 册</button>
        </div>

      </div>
    </div>

  </div>

  <div class="tagline">一机一码 · 保护好我呀</div>
</div>

<script>
  // Tab 切换
  function switchTab(tab) {
    const loginTab = document.getElementById('tab-login');
    const regTab = document.getElementById('tab-register');
    const loginForm = document.getElementById('login-form-card');
    const regForm = document.getElementById('reg-form-card');

    if (tab === 'login') {
      loginTab.classList.add('active');
      regTab.classList.remove('active');
      loginForm.classList.add('show');
      regForm.classList.remove('show');
    } else {
      regTab.classList.add('active');
      loginTab.classList.remove('active');
      regForm.classList.add('show');
      loginForm.classList.remove('show');
    }
  }

  // 清除输入
  function clearInput(id) {
    const el = document.getElementById(id);
    el.value = '';
    el.focus();
    // 触发 input 事件以隐藏清除按钮
    el.dispatchEvent(new Event('input'));
  }

  // 显示/隐藏密码
  function togglePass(id, cb) {
    document.getElementById(id).type = cb.checked ? 'text' : 'password';
  }

  // Toast
  function toast(m) {
    const t = document.getElementById('toast');
    t.textContent = m; t.classList.add('show');
    clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2000);
  }

  // 登录
  function handleLogin() {
    const a = document.getElementById('login-account').value.trim();
    const p = document.getElementById('login-password').value.trim();
    if (!a) return toast('请输入账号');
    if (!p) return toast('请输入密码');
    const users = JSON.parse(localStorage.getItem('app_users_v2') || '{}');
    if (!users[a]) return toast('账号不存在');
    if (users[a].password !== p) return toast('密码错误');
    toast('登录成功 (´▽`ʃ♡ƪ)');
  }

  // 注册
  function handleRegister() {
    const qq = document.getElementById('reg-qq').value.trim();
    const cd = document.getElementById('reg-code').value.trim();
    const p1 = document.getElementById('reg-password').value.trim();
    const p2 = document.getElementById('reg-password-confirm').value.trim();
    if (!qq) return toast('请输入QQ号');
    if (!cd) return toast('请输入激活码');
    if (!p1) return toast('请设置密码');
    if (p1.length < 6) return toast('密码至少6位');
    if (p1 !== p2) return toast('两次密码不一致');
    if (cd !== '123456' && cd !== '888888') return toast('激活码无效');
    const users = JSON.parse(localStorage.getItem('app_users_v2') || '{}');
    if (users[qq]) return toast('该账号已注册');
    users[qq] = { qq, password: p1, activationCode: cd, createdAt: new Date().toISOString() };
    localStorage.setItem('app_users_v2', JSON.stringify(users));
    toast('注册成功！请返回登录 ₍˄·͈༝·˄˄₎');
    setTimeout(() => switchTab('login'), 1200);
  }
</script>

</body>
</html>
